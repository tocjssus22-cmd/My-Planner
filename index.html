<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐱 My Planner Premium</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="topbar">
  <h1>🐱 My Planner</h1>

  <div id="today"></div>
</header>

<div class="dashboard">

<div class="card income">
<h3>💰 이번 달 수입</h3>
<h1 id="incomeTotal">0원</h1>
</div>

<div class="card expense">
<h3>💸 이번 달 지출</h3>
<h1 id="expenseTotal">0원</h1>
</div>

<div class="card remain">
<h3>💵 남은 돈</h3>
<h1 id="remainTotal">0원</h1>
</div>

<div class="card cat">
<h3>🐱 냥이 비용</h3>
<h1 id="catTotal">0원</h1>
</div>

<div class="card">
<h3>📅 오늘 납부</h3>

<ul id="todayList">

<li>없음</li>

</ul>

</div>

<div class="card">
<h3>🚨 연체 목록</h3>

<ul id="lateList">

<li>없음</li>

</ul>

</div>

<div class="card chart">

<h3>📊 카테고리별 지출</h3>

<canvas id="pieChart"></canvas>

</div>

<div class="card chart">

<h3>📈 월별 수입/지출</h3>

<canvas id="barChart"></canvas>

</div>

<div class="card">

<h3>🎯 목표</h3>

<div id="goalProgress">

준비중

</div>

</div>

<div class="card">

<h3>📝 메모</h3>

<textarea id="memo"></textarea>

</div>

</div>

<nav class="bottomNav">

<button>🏠<br>Home</button>

<button>💰<br>수입</button>

<button>💸<br>지출</button>

<button>🐱<br>고양이</button>

<button>📅<br>반복</button>

<button>📊<br>통계</button>

</nav>

<script src="script.js"></script>

</body>
</html>
