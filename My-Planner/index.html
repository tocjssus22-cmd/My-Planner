<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Planner</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="app">

<header class="header">

<img src="cat-gray.png" class="cat">

<div>

<h1>My Planner</h1>

<p>
월세 · 수입 · 지출 · 냥이 관리
</p>

</div>

<img src="cat-gold.png" class="cat">

</header>

<!-- 홈 -->

<main id="homePage">

<section class="summary">

<div class="summary-card">

<h4>이번 달 수입</h4>

<h2 id="incomeMoney">0원</h2>

</div>

<div class="summary-card">

<h4>이번 달 지출</h4>

<h2 id="expenseMoney">0원</h2>

</div>

<div class="summary-card">

<h4>남은 돈</h4>

<h2 id="remainMoney">0원</h2>

</div>

</section>

<section class="todo">

<h2>✅ 오늘 할 일</h2>

<div id="todoList"></div>

<button class="addBtn">

+ 할 일 추가

</button>

</section>

</main>
<!-- 돈관리 -->

<main id="moneyPage" style="display:none;">

<section class="summary">

<div class="summary-card">
<h4>이번 달 수입</h4>
<h2 id="moneyIncome">0원</h2>
</div>

<div class="summary-card">
<h4>이번 달 지출</h4>
<h2 id="moneyExpense">0원</h2>
</div>

<div class="summary-card">
<h4>남은 돈</h4>
<h2 id="moneyRemain">0원</h2>
</div>

</section>

<section class="todo">

<h2>💸 고정 지출</h2>

<div id="expenseList"></div>

<button class="addBtn" onclick="addExpense()">

+ 지출 추가

</button>

</section>

</main>

<!-- 냥이 -->

<main id="catPage" style="display:none;">

<section class="todo">

<h2>🐱 순복</h2>

<div class="todo-item">

<span>🍚 사료</span>

<input type="checkbox">

</div>

<div class="todo-item">

<span>🛡 펫보험</span>

<input type="checkbox">

</div>

</section>

<section class="todo">

<h2>🐱 춘복</h2>

<div class="todo-item">

<span>🍚 사료</span>

<input type="checkbox">

</div>

<div class="todo-item">

<span>🛡 펫보험</span>

<input type="checkbox">

</div>

</section>

</main>

<!-- 통계 -->

<main id="statsPage" style="display:none;">

<section class="summary">

<div class="summary-card">

<h3>📊 통계</h3>

<p>

이번 달 수입과 지출이 표시됩니다.

</p>

</div>

</section>

</main>
<!-- 설정 -->

<main id="settingPage" style="display:none;">

<section class="todo">

<h2>⚙️ 설정</h2>

<div class="todo-item">

<span>🌙 다크모드 (준비중)</span>

</div>

<div class="todo-item">

<span>💾 자동 저장</span>

</div>

</section>

</main>

<!-- 하단 메뉴 -->

<nav class="bottom">

<button onclick="showPage('home')">
🏠
<br>
홈
</button>

<button onclick="showPage('money')">
💰
<br>
돈관리
</button>

<button onclick="showPage('cat')">
🐱
<br>
냥이
</button>

<button onclick="showPage('stats')">
📊
<br>
통계
</button>

<button onclick="showPage('setting')">
⚙️
<br>
설정
</button>

</nav>

</div>

<script src="script.js"></script>

</body>
</html>
