<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Planner</title>

<style>

body{
margin:0;
padding:20px;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f2f7;
}

.card{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h1{
margin-top:0;
text-align:center;
}

.row{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
font-size:17px;
border-radius:12px;
border:1px solid #ddd;
}

button{
padding:12px 18px;
background:#007AFF;
color:white;
border:none;
border-radius:12px;
font-size:16px;
}

ul{
padding:0;
}

li{
display:flex;
justify-content:space-between;
align-items:center;
list-style:none;
background:#f7f7f7;
padding:12px;
margin-top:10px;
border-radius:12px;
}

.done{
text-decoration:line-through;
color:#999;
}

.delete{
background:#ff3b30;
}

</style>

</head>

<body>

<div class="card">

<h1>📒 My Planner</h1>

<div class="row">

<input
id="task"
placeholder="할 일을 입력하세요">

<button onclick="addTask()">

추가

</button>

</div>

<ul id="list"></ul>

</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

function save(){

localStorage.setItem("tasks",JSON.stringify(tasks));

}

function render(){

let list=document.getElementById("list");

list.innerHTML="";

tasks.forEach((t,i)=>{

let li=document.createElement("li");

li.innerHTML=`
<span class="${t.done?'done':''}"
onclick="toggle(${i})">

${t.text}

</span>

<button
class="delete"
onclick="removeTask(${i})">

삭제

</button>
`;

list.appendChild(li);

});

}

function addTask(){

let input=document.getElementById("task");

if(input.value=="") return;

tasks.push({

text:input.value,

done:false

});

input.value="";

save();

render();

}

function toggle(i){

tasks[i].done=!tasks[i].done;

save();

render();

}

function removeTask(i){

tasks.splice(i,1);

save();

render();

}

render();

</script>

</body>
</html>
